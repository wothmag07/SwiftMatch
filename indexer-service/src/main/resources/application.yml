server:
  port: 8081

spring:
  application:
    name: indexer-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/swiftmatch}
    username: ${DB_USER:swiftmatch}
    password: ${DB_PASSWORD:swiftmatch}
  jpa:
    hibernate:
      ddl-auto: none
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9094}
    consumer:
      group-id: indexer
      auto-offset-reset: latest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.swiftmatch.common.*"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics

swiftmatch:
  history:
    batchSize: 500
    batchIntervalMs: 500

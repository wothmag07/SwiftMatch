server:
  port: 8081

spring:
  application:
    name: indexer-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/swiftmatch}
    username: ${DB_USER:swiftmatch}
    password: ${DB_PASSWORD:swiftmatch}
  # api-service owns schema migrations; indexer only reads/writes an already-migrated DB.
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9094}
    consumer:
      group-id: indexer
      auto-offset-reset: latest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.swiftmatch.common.*"
        spring.json.value.default.type: com.swiftmatch.common.location.LocationEvent
        spring.json.use.type.headers: false
    listener:
      ack-mode: manual

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always

swiftmatch:
  history:
    batchSize: 500
    batchIntervalMs: 500
